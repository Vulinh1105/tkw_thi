<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch vụ sự kiện</title>
    <link rel="stylesheet" href="cau3.css">
</head>
<body>

<h1>DANH SÁCH DỊCH VỤ</h1>

<div id="service-list"></div>

<script>

const services = [
    { ten: "Tiệc cưới", hinh: "https://placehold.co/600x400", moTa: "Tổ chức tiệc cưới sang trọng", danhGia: "5 sao" },
    { ten: "Sinh nhật", hinh: "https://placehold.co/600x400", moTa: "Trang trí sinh nhật chuyên nghiệp", danhGia: "4 sao" },
    { ten: "Khai trương", hinh: "https://placehold.co/600x400", moTa: "Tổ chức lễ khai trương", danhGia: "5 sao" },
    { ten: "Hội nghị", hinh: "https://placehold.co/600x400", moTa: "Dịch vụ hội nghị cao cấp", danhGia: "4 sao" },
    { ten: "Liveshow", hinh: "https://placehold.co/600x400", moTa: "Tổ chức liveshow âm nhạc", danhGia: "5 sao" },
    { ten: "Team Building", hinh: "https://placehold.co/600x400", moTa: "Hoạt động tập thể ngoài trời", danhGia: "5 sao" }
];

const container = document.getElementById("service-list");

let i = 0;
while (i < services.length) {
    const service = services[i];
    container.innerHTML += `
        <div class="card">
            <img src="${service.hinh}">
            <h2>${service.ten}</h2>
            <p>${service.moTa}</p>
            <span>${service.danhGia}</span>
        </div>
    `;
    i++;
}

</script>

</body>
</html>
